<header class="hero">
    <picture class="hero__media">
        <source
            type="image/webp"
            srcset="/static/images/first-600.webp 600w,
                    /static/images/first-900.webp 900w,
                    /static/images/first-1200.webp 1200w"
            sizes="100vw">
        <img
            class="hero__img"
            src="/static/images/first-900.jpg"
            srcset="/static/images/first-600.jpg 600w,
                    /static/images/first-900.jpg 900w,
                    /static/images/first-1200.jpg 1200w"
            sizes="100vw"
            alt="Наша фотография"
            fetchpriority="high"
            decoding="async"
            width="1080" height="1183">
    </picture>
    <div class="hero__overlay">
        <p class="hero__eyebrow">Приглашение на свадьбу</p>
        <p class="hero__date">26 сентября 2026</p>
    </div>
</header>
