<section class="section section--rsvp reveal" id="rsvp">
    <h2 class="section__title">Вы придёте?</h2>
    <p class="rsvp__hint">Пожалуйста, подтвердите своё присутствие</p>

    <form class="rsvp-form" id="rsvp-form" novalidate>
        <div class="field">
            <label class="field__label" for="full_name">Имя и фамилия</label>
            <input
                class="field__input" type="text" id="full_name" name="full_name"
                required minlength="2" maxlength="150"
                autocomplete="name" placeholder="Иван Иванов">
        </div>

        <div class="field">
            <span class="field__label">Придёте на праздник?</span>
            <div class="choice" role="radiogroup" aria-label="Придёте на праздник?">
                <label class="choice__option">
                    <input type="radio" name="attending" value="yes" required>
                    <span>Да, приду</span>
                </label>
                <label class="choice__option">
                    <input type="radio" name="attending" value="no">
                    <span>Не смогу</span>
                </label>
            </div>
        </div>

        {% if enable_guests_count_field %}
        <div class="field" id="guests-field">
            <label class="field__label" for="guests_count">Придёте с гостями?</label>
            <select class="field__input" id="guests_count" name="guests_count">
                <option value="0">Приду один / одна</option>
                <option value="1">Со мной +1 гость</option>
                <option value="2">Со мной +2 гостя</option>
            </select>
        </div>
        {% endif %}

        <!-- honeypot: скрыто от людей, ловит ботов -->
        <div class="hp" aria-hidden="true">
            <label>Не заполняйте это поле
                <input type="text" name="website" tabindex="-1" autocomplete="off">
            </label>
        </div>

        <button class="btn btn--primary" type="submit" id="rsvp-submit">
            Подтвердить
        </button>
        <p class="rsvp-form__error" id="rsvp-error" role="alert" hidden></p>
    </form>

    <div class="rsvp-thanks" id="rsvp-thanks" hidden>
        <span class="ornament" aria-hidden="true">&#10084;</span>
        <p id="rsvp-thanks-text"></p>
    </div>
</section>
